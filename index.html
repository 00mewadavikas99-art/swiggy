<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Swiggy</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Menu</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
        <button class="btn">Order Now</button>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-text">
            <h1>Delicious Food Delivered Fast</h1>
            <p>Order your favorite meals anytime, anywhere.</p>
            <button class="btn">Explore Menu</button>
        </div>
    </section>

    <!-- Food Cards -->
    <section class="cards">
        <h2>Popular Dishes</h2>

        <div class="card-container">

            <div class="card">
                <img src="burger.webp" alt="">
                <h3>Burger</h3>
                <p>Cheesy and tasty burger</p>
            </div>

            <div class="card">
                <img src="pizza1.webp" alt="">
                <h3>Pizza</h3>
                <p>Hot and crispy pizza</p>
            </div>

            <div class="card">
                <img src="fryeis.webp" alt="">
                <h3>Pasta</h3>
                <p>Italian style pasta</p>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Cravya Clone. All rights reserved.</p>
    </footer>

</body>
</html>
